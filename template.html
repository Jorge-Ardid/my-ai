<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | AI Tech Reviews</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--dark); margin: 0; line-height: 1.6; }
        .header { background: white; padding: 20px; border-bottom: 1px solid #e2e8f0; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        h1 { font-size: 2.5rem; margin-bottom: 20px; color: var(--dark); letter-spacing: -0.025em; }
        .content { color: #475569; font-size: 1.125rem; }
        .cta { margin-top: 40px; padding: 30px; background: #f1f5f9; border-radius: 20px; text-align: center; }
        .btn { display: inline-block; background: var(--primary); color: white; padding: 16px 32px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #4338ca; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="header">AI TECH INSIDER</div>
    <div class="container">
        <h1>{{title}}</h1>
        <div class="content">{{content}}</div>
        <div class="cta">
            <p><strong>Актуальна пропозиція:</strong> Ми знайшли цей товар за найкращою ціною!</p>
            <a href="https://amazon.com" class="btn">Перевірити ціну на Amazon ➔</a>
        </div>
    </div>
</body>
</html>

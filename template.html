<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | TechStore Review</title>
    <style>
        :root { --primary: #0d6efd; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; margin: 0; }
        header { background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); color: white; padding: 3rem 1rem; text-align: center; }
        .container { max-width: 900px; margin: -2rem auto 3rem; background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { font-size: 2.5rem; margin-bottom: 1.5rem; }
        .content { font-size: 1.1rem; color: #475569; margin-bottom: 2rem; }
        .cta-box { background: #f1f5f9; padding: 2rem; border-radius: 15px; text-align: center; border: 2px solid var(--primary); }
        .btn { display: inline-block; background: var(--primary); color: white; padding: 1rem 2.5rem; border-radius: 50px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .btn:hover { background: #0b5ed7; transform: translateY(-3px); }
        footer { background: var(--dark); color: #94a3b8; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <header>
        <h1>TechStore AI Reviews</h1>
        <p>Автоматичний аналіз кращих пропозицій</p>
    </header>
    <div class="container">
        <h1>{{title}}</h1>
        <div class="content">{{content}}</div>
        <div class="cta-box">
            <h3>Цікавить ця модель?</h3>
            <p>Ми знайшли найкращу ціну для вас!</p>
            <a href="https://amazon.com" class="btn">Перевірити наявність ➔</a>
        </div>
    </div>
    <footer>© 2026 TechStore · Автоматичний огляд</footer>
</body>
</html>

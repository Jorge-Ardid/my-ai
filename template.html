<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | TechStore Review</title>
    <style>
        :root { --primary: #0d6efd; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--light); color: var(--dark); margin: 0; line-height: 1.6; }
        header { background: var(--dark); color: white; padding: 1.5rem; text-align: center; }
        .container { max-width: 800px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 2.2rem; color: var(--dark); }
        .content { font-size: 1.1rem; color: #475569; white-space: pre-wrap; }
        .cta-box { margin-top: 2rem; padding: 2rem; background: #f1f5f9; border-radius: 12px; text-align: center; }
        .btn { display: inline-block; background: var(--primary); color: white; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; }
        footer { text-align: center; padding: 2rem; color: #64748b; }
    </style>
</head>
<body>
    <header><h1>TechStore AI Analysis</h1></header>
    <div class="container">
        <a href="../index.html" style="text-decoration: none;">← На головну</a>
        <h1>{{title}}</h1>
        <div class="content">{{content}}</div>
        <div class="cta-box">
            <h3>Сподобався пристрій?</h3>
            <p>Ми знайшли найкращу ціну для вас на Amazon!</p>
            <a href="https://amazon.com" class="btn">Перевірити ціну ➔</a>
        </div>
    </div>
    <footer>© 2026 TechStore</footer>
</body>
</html>

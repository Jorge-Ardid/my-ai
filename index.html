<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | AI Огляди</title>
    <style>
        :root { --primary: #0d6efd; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--light); color: var(--dark); margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); color: white; padding: 3rem 1rem; text-align: center; }
        header h1 { margin: 0; font-size: 2.5rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: 0.3s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .card-content { padding: 1.5rem; }
        .card h3 { margin: 0 0 1rem 0; color: var(--dark); font-size: 1.25rem; }
        .price-tag { display: inline-block; background: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold; }
        footer { background: var(--dark); color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>

    <header>
        <h1>TechStore</h1>
        <p>Тільки чесні AI-огляди техніки 2026</p>
    </header>

    <div class="container">
        <h2>Популярні огляди</h2>
        <div class="products">
</div>
    </div>

    <footer>
        <p>© 2026 TechStore · Всі посилання активні</p>
    </footer>

</body>
</html>

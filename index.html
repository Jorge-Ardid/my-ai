<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Premium AI Reviews</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
            color: white;
            padding: 5rem 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            margin: -3rem auto 4rem;
            padding: 0 1.5rem;
        }

        .section-title {
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 700;
            color: white; /* ВИПРАВЛЕНО: тепер видно на темному фоні */
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.1);
            border-color: var(--primary);
        }

        .card .tag {
            background: #eef2ff;
            color: var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            align-self: flex-start;
            margin-bottom: 1.5rem;
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .card p {
            color: var(--gray);
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .btn-link {
            display: flex;
            align-items: center;
            color: var(--primary);
            font-weight: 700;
            gap: 0.5rem;
        }

        footer {
            background: var(--dark);
            color: #94a3b8;
            text-align: center;
            padding: 4rem 1rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>TechStore</h1>
        <p>Майбутнє техніки в наших експертних AI-оглядах 2026.</p>
    </header>

    <div class="container">
        <h2 class="section-title">Свіжі надходження</h2>
        <div class="products">
</div>
    </div>

    <footer>
        <p>© 2026 TechStore AI. Всі права захищені.</p>
    </footer>

</body>
</html>
